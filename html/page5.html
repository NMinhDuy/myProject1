<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trang thông tin cá nhân</title>
    <link rel="stylesheet" href = "../css/style5.css">
</head>
<body>

<script>

//Khai báo 
const productItem = document.createElement("div");
productItem.setAttribute("class", "product-item");


//div1
const productDiv1 = document.createElement("div");
productDiv1.setAttribute("class", "product-image");

//tạo hình
const productImage = document.createElement("img");
productImage.setAttribute("src", "../assets/image/hoa.png");
productImage.setAttribute("alt", "Hạt giống hoa hồng Pháp");

//gán hình vào div1
productDiv1.appendChild(productImage);


const productDiv2 = document.createElement("div");
productDiv2.setAttribute("class", "product-info");

//text 1
const name = document.createElement("p");
name.className = "title";
name.innerText = "Hạt giống hoa hồng Pháp";

const desc = document.createElement("c");
desc.className = "desc";
desc.innerText = "Hoa hồng leo Pháp, dễ trồng, nở đẹp quanh năm.";


//text 2
const priceLabel = document.createElement("p");
priceLabel.className = "title";
priceLabel.innerText = "Giá cả";


const priceValue = document.createElement("c");
priceValue.className = "price";
priceValue.innerText = "25000 VND/ 50 hạt";

//link
const link = document.createElement("a");
link.href = "https://hatgiongphuongnam.com/san-pham/hat-giong-hoa-hong-leo-189.html";
link.target = "_blank";
link.innerText = "Xem chi tiết";

//gán vào div và item
productDiv2.append(name, desc, priceLabel, priceValue, link);
productItem.append(productDiv1, productDiv2);

//gán vào body
document.body.appendChild(productItem);
</script>

</body>
</html>
